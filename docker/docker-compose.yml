services:
    lichtfeld-studio:
        runtime: nvidia
        container_name: lichtfeld-studio
        build:
            context: ../
            dockerfile: ./docker/Dockerfile
            args:
                USER_UID: ${USER_UID}
                USER_GID: ${USER_GID}
                USERNAME: ${USERNAME}
                HOSTNAME: ${HOSTNAME}
                USER_PASSWORD: ${USER_PASSWORD}
                CUDA_VERSION: ${CUDA_VERSION}
        image: lichtfeld-studio:latest
        network_mode: "host"
        working_dir: /home/${USERNAME}/projects/LichtFeld-Studio
        mem_limit: 24g
        ipc: host
        pid: host
        privileged: true
        devices:
            - /dev/dri/:/dev/dri/
        user: "${USERNAME}:${USER_GID}"
        hostname: ${HOSTNAME}
        stdin_open: true
        tty: true
        environment:
            - USER_UID=${USER_UID}
            - USER_GID=${USER_GID}
            - USERNAME=${USERNAME}
            - DISPLAY=${DISPLAY}
            - QT_QPA_PLATFORM=xcb
            - XAUTHORITY=${XAUTHORITY}
            - SSH_AUTH_SOCK=${SSH_AUTH_SOCK}
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=all
            - __GLX_VENDOR_LIBRARY_NAME=nvidia
            - __NV_PRIME_RENDER_OFFLOAD=1
        volumes:
            - ../:/home/${USERNAME}/projects/LichtFeld-Studio
            - /tmp/.X11-unix:/tmp/.X11-unix:rw
            - ${HOME}/.Xauthority:/home/${USERNAME}/.Xauthority:rw
            - ${HOME}/.ssh:/home/${USERNAME}/.ssh:ro
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [gpu, compute, utility, graphics]
        ports:
            - "7860:7860"
